networks:
  ifood-network:
    driver: bridge
 
volumes:
  minio_data:
  postgres_data:
 
services:
 
  # ── 1. MinIO ─────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: ifood_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - ifood-network
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── 2. MinIO Init ─────────────────────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: ifood_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 admin admin123;
        mc mb --ignore-existing local/ifood-data-lake;
        echo 'Bucket ifood-data-lake pronto.';
      "
    networks:
      - ifood-network
 
  # ── 3. Jupyter + PySpark ──────────────────────────────────────────────────────
  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.0
    container_name: ifood_jupyter
    ports:
      - "8888:8888"
      - "4040:4040"
    networks:
      - ifood-network
    environment:
      - JUPYTER_ENABLE_LAB=yes
    volumes:
      - ./src:/home/jovyan/work/src
      - ./analysis:/home/jovyan/work/analysis
      - ./landing_temp:/home/jovyan/work/landing_temp
    depends_on:
      minio:
        condition: service_healthy
 
  # ── 4. PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: ifood_postgres
    networks:
      - ifood-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
 
  # ── 5. Airflow Init ───────────────────────────────────────────────────────────
  # Usa imagem customizada com PySpark instalado
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifood_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ifood-network
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./landing_temp:/opt/airflow/landing_temp
    entrypoint: ["/bin/bash", "-c", "airflow db migrate && airflow users create -u admin -p admin -f Admin -l User -r Admin -e admin@ifood.com && echo 'Airflow inicializado com sucesso.'"]
 
  # ── 6. Airflow Webserver ──────────────────────────────────────────────────────
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifood_airflow_webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    networks:
      - ifood-network
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./landing_temp:/opt/airflow/landing_temp
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
 
  # ── 7. Airflow Scheduler ──────────────────────────────────────────────────────
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ifood_airflow_scheduler
    depends_on:
      - airflow-init
    networks:
      - ifood-network
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./landing_temp:/opt/airflow/landing_temp
    command: scheduler